version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: sysid9-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: sysid9
      MYSQL_USER: sysid9
      MYSQL_PASSWORD: sysid9pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sysid9-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+pymysql://sysid9:sysid9pass@mysql:3306/sysid9
      SECRET_KEY: change-this-to-a-secure-random-key
      AGENT_API_KEY: change-this-agent-key
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sysid9-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mysql_data:
